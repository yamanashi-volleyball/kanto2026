<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>【閲覧用】関東大会（女子）結果速報</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f2744;--blue:#1d6fa4;--sky:#4aaed9;
  --green:#1e9e5e;--red:#d63031;--orange:#e17055;
  --gold:#f0b429;--purple:#6c3483;
  --bg:#f0f4f9;
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:#1a202c;font-size:13px;min-height:100vh}

/* ヘッダー */
.hdr{background:linear-gradient(135deg,var(--navy) 0%,#1a3a6e 60%,var(--blue) 100%);color:#fff;text-align:center;padding:12px;position:sticky;top:0;z-index:400;box-shadow:0 3px 16px rgba(0,0,0,.3)}
.hdr-title{font-size:14px;font-weight:900;letter-spacing:.05em}
.hdr-sub{font-size:10px;opacity:.7;margin-top:2px}
.hdr-actions{margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
.hbtn{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.4);color:#fff;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.hbtn.off{background:rgba(0,0,0,.2);border-color:rgba(255,255,255,.25);opacity:.75}
.hbtn:hover{background:rgba(255,255,255,.25)}
.cloud-status{font-size:10px;color:rgba(255,255,255,.8)}

/* 部タブ */
.section-nav{display:flex;background:#fff;border-bottom:3px solid #dde5f0;position:sticky;top:53px;z-index:399;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.snbtn{flex:1;padding:11px 8px;border:none;border-bottom:4px solid transparent;background:none;font-family:inherit;font-size:12px;font-weight:900;cursor:pointer;transition:all .2s;white-space:nowrap}
.snbtn[data-sec="female"].on{color:#c2185b;border-bottom-color:#c2185b;background:#fce4ec}

/* 日程タブ */
.day-nav{display:flex;background:#fff;border-bottom:2px solid #eef2f7;position:sticky;top:100px;z-index:398;padding:0 8px}
.dnbtn{padding:9px 18px;border:none;border-bottom:3px solid transparent;background:none;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;color:#888;transition:all .2s;white-space:nowrap}
.dnbtn.on{color:var(--navy);border-bottom-color:var(--navy)}

/* コンテンツ */
.sec-pg{display:none;padding:12px;max-width:1100px;margin:0 auto}
.sec-pg.on{display:block}
.day-pg{display:none}
.day-pg.on{display:block}

/* カード */
.card{background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);margin-bottom:14px;overflow:hidden}
.ch{padding:10px 14px;font-weight:900;font-size:13px;color:#fff;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ch-female{background:linear-gradient(135deg,#c2185b,#e91e63)}
.ch-final{background:linear-gradient(135deg,#7b1fa2,#9c27b0)}
.cb{padding:12px}

/* トースト */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:#2c3e50;color:#fff;padding:10px 22px;border-radius:20px;font-size:12px;font-weight:700;z-index:999;transition:transform .3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.25)}
.toast.show{transform:translateX(-50%) translateY(0)}

/* リーグ表 */
.league-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}
.part-card{background:#fff;border-radius:12px;border:2px solid #e8eef5;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05);display:flex;flex-direction:column}
.part-head{padding:8px 12px;font-weight:900;font-size:12px;color:#fff;display:flex;align-items:center;gap:6px;justify-content:space-between}
.part-body{padding:10px;flex-grow:1;display:flex;flex-direction:column;justify-content:space-between}
.venue-lbl{font-size:9px;opacity:.8;font-weight:500}

/* 試合テーブル */
.mtbl{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:8px}
.mtbl th{background:#374151;color:#fff;padding:5px 4px;font-size:9px;text-align:center}
.mtbl td{border:1px solid #e8eef5;padding:6px 4px;text-align:center;vertical-align:middle}
.mn{background:#f5f7fa;font-weight:900;color:#555;font-size:10px;white-space:nowrap}
.tc{text-align:left!important;font-weight:700;font-size:11px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.score-disp-box {display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:900;font-size:11px;gap:3px;}
.score-set-row {font-size:10px;color:#666;font-weight:normal;}
.live-status{font-size:10px;font-weight:900;color:var(--orange);display:flex;align-items:center;gap:3px}
.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--red);animation:blinkDot 1s infinite}
@keyframes blinkDot{0%,100%{opacity:1}50%{opacity:.15}}
.set-row{display:flex;gap:3px;justify-content:center}
.set-chip{min-width:34px;border-radius:6px;padding:2px 3px;text-align:center;border:1.5px solid #e2e8f0;background:#f8fafc;line-height:1.25}
.set-chip .sc-num{font-size:8px;font-weight:900;color:#a0aec0}
.set-chip .sc-score{font-size:11px;font-weight:900;color:#cbd5e1}
.set-chip.pending{border-style:dashed}
.set-chip.done{background:#fff;border-color:#dde5f0}
.set-chip.done .sc-num{color:#94a3b8}
.set-chip.done .sc-score{color:#374151}
.set-chip.done .sc-a.win,.set-chip.done .sc-b.win{color:var(--green)}
.set-chip.done .sc-a.lose,.set-chip.done .sc-b.lose{color:#c4c9d2;font-weight:700}
.set-chip.live{background:#fff7ed;border-color:var(--orange);animation:pulseChip 1.6s infinite}
.set-chip.live .sc-num{color:var(--orange)}
.set-chip.live .sc-score{color:#c2410c}
@keyframes pulseChip{0%,100%{box-shadow:0 0 0 0 rgba(225,112,85,.3)}50%{box-shadow:0 0 0 3px rgba(225,112,85,0)}}
.tgt15{display:block;font-size:6.5px;font-weight:700;opacity:.65;margin-top:-1px}

/* 勝ち負けデザイン */
.win-team {color:var(--green);}
.score-big {font-size:14px;font-weight:900;padding:0 4px;}
.score-big.win {color:var(--green);}
.score-big.lose {color:var(--red);}

/* 順位表 */
.rtbl{width:100%;border-collapse:collapse;font-size:10px}
.rtbl th{background:#374151;color:#fff;padding:4px 3px;font-size:9px;text-align:center}
.rtbl td{border:1px solid #e8eef5;padding:4px 2px;text-align:center}
.rn{text-align:left!important;padding-left:5px!important;font-weight:700;font-size:10px}

/* 未完了メッセージ */
.pending-msg {background:#f8fafc; border:1px dashed #cbd5e1; border-radius:6px; color:#64748b; padding:12px; text-align:center; font-weight:700; font-size:11px; margin-top:8px;}

/* 進捗 */
.prog{padding:6px 12px;background:#f0f5fc;border-bottom:1px solid #e0e9f5}
.pbar{height:5px;background:#c8d8e8;border-radius:3px;overflow:hidden;margin-top:3px}
.pfill{height:100%;background:linear-gradient(90deg,var(--green),#56d58a);border-radius:3px;transition:width .4s}

/* 表彰台・順位行 */
.podium{background:linear-gradient(135deg,#fffde7,#fff9c4);border:2px solid var(--gold);border-radius:12px;padding:10px 12px;margin-top:10px}
.podium-title{font-size:12px;font-weight:900;color:#78350f;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.podium-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid rgba(217,119,6,.2)}
.podium-name{font-weight:900;font-size:12px;padding:2px 8px;border-radius:6px;background:#fef3c7;color:#78350f}
.podium-rank-lbl{font-weight:900;font-size:11px;min-width:78px;flex-shrink:0;white-space:nowrap}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">🏐 関東大会（女子の部） 結果速報</div>
  <div class="hdr-sub">本部入力システムと連動してリアルタイムに結果が表示されます</div>
  <div class="hdr-actions">
    <button class="hbtn" onclick="cloudLoad()">🔄 最新の情報に更新</button>
    <button class="hbtn" id="auto-refresh-btn" onclick="toggleAutoRefresh()">⏱️ 自動更新: ON</button>
    <span class="cloud-status" id="cloud-status">読込中...</span>
  </div>
</div>

<div class="section-nav">
  <button class="snbtn on" data-sec="female">🏐 関東大会（女子）</button>
</div>

<div class="sec-pg on" id="sec-female">
  <div class="day-nav">
    <button class="dnbtn on" data-day="1" data-sec="female" onclick="switchDay('female',1)">📅 1日目 パート予選</button>
    <button class="dnbtn" data-day="2" data-sec="female" onclick="switchDay('female',2)">🏆 2日目 順位別リーグ</button>
  </div>
  <div class="day-pg on" id="day-female-1"></div>
  <div class="day-pg" id="day-female-2"></div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

const GAS_URL='https://script.google.com/macros/s/AKfycbwZcyk-R-4ietaZGllMjAWmNIQBu16yURBgnLx9VvxOvHea9C53N7py0lYt7p7Ab0kA/exec';
const STORE='yamanashi_viewer_v1';

const TOURNAMENT={
  female:{
    label:'女子の部',
    parts:[
      {id:'A',name:'Aパート',venue:'会場1', teams:['Aチーム1','Aチーム2','Aチーム3']},
      {id:'B',name:'Bパート',venue:'会場2', teams:['Bチーム1','Bチーム2','Bチーム3']},
      {id:'C',name:'Cパート',venue:'会場3', teams:['Cチーム1','Cチーム2','Cチーム3']}
    ],
    day2:{
      type:'three_leagues',
      label:'順位別リーグ戦',
      venue:'笛吹市 若彦路体育館',
      partIds:['A','B','C'],
      leagues:[
        {rank:0,id:'L1',label:'1位リーグ',overallBase:0,color:'#f0b429'},
        {rank:1,id:'L2',label:'2位リーグ',overallBase:3,color:'#1d6fa4'},
        {rank:2,id:'L3',label:'3位リーグ',overallBase:6,color:'#1e9e5e'}
      ]
    }
  }
};

const M3=[[0,1,'①vs②'],[1,2,'②vs③'],[2,0,'③vs①']];
let DB={ scores:{}, teamNames:{}, t2scores:{}, t2teams:{}, groups:{} };

function save(){try{localStorage.setItem(STORE,JSON.stringify(DB));}catch(e){}}
function load(){
  try{
    const d=localStorage.getItem(STORE);
    if(d){const p=JSON.parse(d);DB=Object.assign({scores:{},teamNames:{},t2scores:{}},p);}
  }catch(e){}
}

let firstCloudLoadDone=false;

async function cloudLoad(isAuto) {
  const statusEl = document.getElementById('cloud-status');
  if(statusEl) statusEl.textContent = '⏳ 読込中...';
  try {
    const res = await fetch(GAS_URL + '?mode=data');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data && typeof data === 'object') {
      DB = Object.assign({scores:{},teamNames:{},t2scores:{}}, data);
      save();
      renderAll();

      // 初回読込時のみ、本部が最後に開いていた日程に合わせる
      // （自動更新のたびに閲覧者が見ているタブを勝手に切り替えない）
      if(!firstCloudLoadDone && DB.lastView && DB.lastView.day) {
        switchDay('female', DB.lastView.day);
      }
      firstCloudLoadDone=true;

      const timeStr = new Date().toLocaleTimeString('ja-JP');
      if(statusEl) statusEl.textContent = `更新済み ${timeStr} ✅`;
      if(!isAuto) showToast('最新データを読み込みました！'); // 手動更新時のみ通知
    }
  } catch (e) {
    if(statusEl) statusEl.textContent = '❌ 読み込みエラー';
    if(!isAuto) showToast('データ取得に失敗しました');
    console.error(e);
  }
}

function showToast(msg){
  const t=document.getElementById('toast');
  if(!t)return;
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

let currentSec='female';
let currentDay={female:1}; 

function switchDay(sec,day){
  currentDay[sec]=day;
  document.querySelectorAll(`.dnbtn[data-sec="${sec}"]`).forEach(b=>b.classList.toggle('on',parseInt(b.dataset.day)===day));
  document.querySelectorAll(`#sec-${sec} .day-pg`).forEach(p=>p.classList.toggle('on',p.id===`day-${sec}-${day}`));
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function teamName(sec,partId,ti){
  const k=sec+'_'+partId+'_'+ti;
  if(DB.teamNames[k]!==undefined && DB.teamNames[k]!=='')return DB.teamNames[k];
  const part=TOURNAMENT[sec].parts.find(p=>p.id===partId);
  return(part&&part.teams[ti])||'チーム'+(ti+1);
}

function scoreKey(sec,partId,mi,side,st){return sec+'_'+partId+'_'+mi+'_'+side+'_s'+st;}
function t2ScoreKey(matchId,side,st){return matchId+'_s'+st+'_'+side;}

function isSetWon(scoreA, scoreB, setNum) {
  const a = parseInt(scoreA);
  const b = parseInt(scoreB);
  if (isNaN(a) || isNaN(b)) return { done: false, winA: false, winB: false };
  const target = (setNum === 3) ? 15 : 21;
  if ((a >= target || b >= target) && Math.abs(a - b) >= 2) {
    return { done: true, winA: a > b, winB: b > a };
  }
  return { done: false, winA: false, winB: false };
}

function matchResult3(sec,partId,mi){
  let sA=0,sB=0,ptA=0,ptB=0;
  let setDetails=[];
  for(let st=1;st<=3;st++){
    const av=DB.scores[scoreKey(sec,partId,mi,'a',st)]||'';
    const bv=DB.scores[scoreKey(sec,partId,mi,'b',st)]||'';
    const target=(st===3)?15:21;
    if(av!==''&&bv!==''){
      ptA+=parseInt(av)||0; ptB+=parseInt(bv)||0;
      const res = isSetWon(av, bv, st);
      if(res.done){
        if(res.winA) sA++;
        if(res.winB) sB++;
      }
      setDetails.push({num:st,a:av,b:bv,target,started:true,done:res.done,winA:res.winA,winB:res.winB});
    } else {
      setDetails.push({num:st,a:av,b:bv,target,started:(av!==''||bv!==''),done:false,winA:false,winB:false});
    }
  }
  const matchDone = (sA === 2 || sB === 2 || (sA+sB === 3));
  return{sA,sB,ptA,ptB,winA:sA>sB,winB:sB>sA,entered:matchDone,setDetails};
}

function jvaCompare(i,j,stat,matchLookup){
  const wrI=stat.mtot[i]===0?0:stat.mw[i]/stat.mtot[i];
  const wrJ=stat.mtot[j]===0?0:stat.mw[j]/stat.mtot[j];
  if(Math.abs(wrI-wrJ)>1e-9)return wrJ-wrI; 
  const srI=stat.sl[i]===0?(stat.sw[i]===0?0:Infinity):stat.sw[i]/stat.sl[i];
  const srJ=stat.sl[j]===0?(stat.sw[j]===0?0:Infinity):stat.sw[j]/stat.sl[j];
  if(srI!==srJ)return srJ-srI;
  const prI=stat.pl[i]===0?(stat.pw[i]===0?0:Infinity):stat.pw[i]/stat.pl[i];
  const prJ=stat.pl[j]===0?(stat.pw[j]===0?0:Infinity):stat.pw[j]/stat.pl[j];
  if(prI!==prJ)return prJ-prI;
  if(matchLookup){
    const h=matchLookup(i,j);
    if(h&&(h.wI||h.wJ)){
      if(h.wI>h.wJ)return -1;
      if(h.wJ>h.wI)return 1;
    }
  }
  return 0;
}

function calcRank3(sec,partId,teams){
  const n=teams.length;
  const pts=Array(n).fill(0),sw=Array(n).fill(0),sl=Array(n).fill(0);
  const pw=Array(n).fill(0),pl=Array(n).fill(0);
  const mw=Array(n).fill(0),ml=Array(n).fill(0),mtot=Array(n).fill(0);
  const h2h={};
  M3.forEach((m,mi)=>{
    const[i,j]=m;const r=matchResult3(sec,partId,mi);if(!r.entered)return;
    sw[i]+=r.sA;sl[i]+=r.sB;sw[j]+=r.sB;sl[j]+=r.sA;
    pw[i]+=r.ptA;pl[i]+=r.ptB;pw[j]+=r.ptB;pl[j]+=r.ptA;
    mtot[i]++;mtot[j]++;
    if(r.winA){pts[i]+=2;mw[i]++;ml[j]++;h2h[i+'_'+j]=1;}
    else if(r.winB){pts[j]+=2;mw[j]++;ml[i]++;h2h[j+'_'+i]=1;}
  });
  const stat={mw,ml,mtot,sw,sl,pw,pl};
  const matchLookup=(a,b)=>({wI:h2h[a+'_'+b]||0,wJ:h2h[b+'_'+a]||0});
  const ranked=[...Array(n).keys()].sort((a,b)=>jvaCompare(a,b,stat,matchLookup)); 
  const sr=i=>sl[i]===0?(sw[i]===0?0:9999):sw[i]/sl[i];
  const winRate=i=>mtot[i]===0?0:mw[i]/mtot[i];
  const ptRate=i=>pl[i]===0?(pw[i]===0?0:9999):pw[i]/pl[i];
  return{pts,sw,sl,pw,pl,mw,ml,mtot,ranked,sr,winRate,ptRate};
}

function makeScoreDisplayHTML(r) {
  const anyStarted = r.setDetails.some(s=>s.started);
  if(!anyStarted) return '<span style="color:#aaa">VS</span>';

  let top;
  if(r.entered){
    // 決着済み：セット取得数を大きく表示
    top = `<div><span class="score-big ${r.winA?'win':''}">${r.sA}</span><span style="color:#888">-</span><span class="score-big ${r.winB?'win':''}">${r.sB}</span></div>`;
  } else {
    // 進行中：試合中バッジ表示（現時点のセットカウント）
    top = `<div class="live-status"><span class="live-dot"></span>試合中 (${r.sA}-${r.sB})</div>`;
  }

  let chips = '<div class="set-row">';
  r.setDetails.forEach(s=>{
    if(!s.started){
      chips += `<div class="set-chip pending"><div class="sc-num">S${s.num}${s.num===3?'<span class="tgt15">15点</span>':''}</div><div class="sc-score">-</div></div>`;
    } else if(s.done){
      chips += `<div class="set-chip done"><div class="sc-num">S${s.num}</div><div class="sc-score"><span class="sc-a ${s.winA?'win':'lose'}">${esc(s.a)}</span>-<span class="sc-b ${s.winB?'win':'lose'}">${esc(s.b)}</span></div></div>`;
    } else {
      chips += `<div class="set-chip live"><div class="sc-num">S${s.num}</div><div class="sc-score">${esc(s.a)}-${esc(s.b)}</div></div>`;
    }
  });
  chips += '</div>';

  return `<div class="score-disp-box">${top}${chips}</div>`;
}

function renderPartCard(sec,partId){
  const part=TOURNAMENT[sec].parts.find(p=>p.id===partId);
  if(!part)return'';
  const teams=part.teams.map((_,ti)=>teamName(sec,partId,ti));
  const rk=calcRank3(sec,partId,teams);

  let mhtml='';
  let doneM=0;
  M3.forEach((m,mi)=>{
    const[i,j,lbl]=m;
    const r = matchResult3(sec,partId,mi);
    if(r.entered) doneM++;
    
    mhtml+=`<tr>
      <td class="mn">${esc(lbl)}</td>
      <td class="tc ${r.winA?'win-team':''}">${esc(teams[i])}</td>
      <td style="background:#fffef8; min-width:90px;">${makeScoreDisplayHTML(r)}</td>
      <td class="tc" style="text-align:right!important; padding-right:6px; ${r.winB?'win-team':''}">${esc(teams[j])}</td>
    </tr>`;
  });

  let rhtml='';
  rk.ranked.forEach((ti,ri)=>{
    const s_wr=rk.winRate(ti).toFixed(3);
    const s_sr=rk.sl[ti]===0?(rk.sw[ti]>0?'MAX':'0.000'):rk.sr(ti).toFixed(3);
    const s_pr=rk.pl[ti]===0?(rk.pw[ti]>0?'MAX':'0.000'):rk.ptRate(ti).toFixed(3);
    rhtml+=`<tr>
      <td style="font-weight:900;background:#f8fafc">${ri+1}</td>
      <td class="rn">${esc(teams[ti])}</td>
      <td>${rk.mw[ti]}勝${rk.ml[ti]}敗</td>
      <td>${s_wr}</td>
      <td>${rk.sw[ti]}/${rk.sl[ti]}<br><span style="color:#666">${s_sr}</span></td>
      <td>${rk.pw[ti]}/${rk.pl[ti]}<br><span style="color:#666">${s_pr}</span></td>
    </tr>`;
  });

  const pct=Math.round((doneM/3)*100);
  let rankSectionHTML = (doneM === 3) ? `
      <div style="margin-top:12px;font-weight:900;font-size:11px;color:var(--green);margin-bottom:4px">📊 【確定】パート順位表</div>
      <table class="rtbl">
        <thead><tr><th style="width:22px">位</th><th>チーム</th><th style="width:45px">勝敗</th><th style="width:38px">勝率</th><th style="width:45px">セット率</th><th style="width:45px">得点率</th></tr></thead>
        <tbody>${rhtml}</tbody>
      </table>` : `<div class="pending-msg">⏳ 進行中（全試合終了後に順位確定）</div>`;

  return `<div class="part-card">
    <div class="part-head ch-female"><span>🏐 ${esc(part.name)} <span class="venue-lbl">📍 ${esc(part.venue)}</span></span></div>
    <div class="prog">
      <div style="display:flex;justify-content:space-between;font-size:9px;color:#555"><span>試合消化: ${doneM}/3</span><span>${pct}%</span></div>
      <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
    </div>
    <div class="part-body">
      <table class="mtbl">
        <thead><tr><th style="width:35px">順序</th><th style="width:105px">チーム①</th><th>結果・スコア</th><th style="width:105px">チーム②</th></tr></thead>
        <tbody>${mhtml}</tbody>
      </table>
      ${rankSectionHTML}
    </div>
  </div>`;
}

function getDay1Seeds(sec){
  const res={};
  TOURNAMENT[sec].parts.forEach(p=>{
    const teams=p.teams.map((_,ti)=>teamName(sec,p.id,ti));
    const rk=calcRank3(sec,p.id,teams);
    res[p.id]=rk.ranked.map(ti=>teams[ti]);
  });
  return res;
}
function getDay2LeagueTeams(sec,partIds,rankIdx){
  const seeds=getDay1Seeds(sec);
  return partIds.map(pid=> (seeds[pid] && seeds[pid][rankIdx]) ? seeds[pid][rankIdx] : `${pid}パート${rankIdx+1}位`);
}

function t2MatchResult(matchId){
  let sA=0,sB=0,ptA=0,ptB=0;
  let setDetails=[];
  for(let st=1;st<=3;st++){
    const av=DB.t2scores[t2ScoreKey(matchId,'a',st)]||'';
    const bv=DB.t2scores[t2ScoreKey(matchId,'b',st)]||'';
    const target=(st===3)?15:21;
    if(av!==''&&bv!==''){
      ptA+=parseInt(av)||0; ptB+=parseInt(bv)||0;
      const res = isSetWon(av, bv, st);
      if(res.done){ if(res.winA) sA++; if(res.winB) sB++; }
      setDetails.push({num:st,a:av,b:bv,target,started:true,done:res.done,winA:res.winA,winB:res.winB});
    } else {
      setDetails.push({num:st,a:av,b:bv,target,started:(av!==''||bv!==''),done:false,winA:false,winB:false});
    }
  }
  return{sA,sB,ptA,ptB,winA:sA>sB,winB:sB>sA,entered:(sA===2||sB===2||(sA+sB===3)),setDetails};
}

function calcDay2LeagueRank(matchIds,teams){
  const n=teams.length;
  const pts=Array(n).fill(0),sw=Array(n).fill(0),sl=Array(n).fill(0),pw=Array(n).fill(0),pl=Array(n).fill(0),mw=Array(n).fill(0),ml=Array(n).fill(0),mtot=Array(n).fill(0);
  const h2h={};
  const pairOrder=[[0,1],[1,2],[2,0]];
  matchIds.forEach((mid,idx)=>{
    const[i,j]=pairOrder[idx];const r=t2MatchResult(mid);if(!r.entered)return;
    sw[i]+=r.sA;sl[i]+=r.sB;sw[j]+=r.sB;sl[j]+=r.sA;pw[i]+=r.ptA;pl[i]+=r.ptB;pw[j]+=r.ptB;pl[j]+=r.ptA;mtot[i]++;mtot[j]++;
    if(r.winA){pts[i]+=2;mw[i]++;ml[j]++;h2h[i+'_'+j]=1;}else if(r.winB){pts[j]+=2;mw[j]++;ml[i]++;h2h[j+'_'+i]=1;}
  });
  const stat={mw,ml,mtot,sw,sl,pw,pl};
  const matchLookup=(a,b)=>({wI:h2h[a+'_'+b]||0,wJ:h2h[b+'_'+a]||0});
  return {
    ranked:[...Array(n).keys()].sort((a,b)=>jvaCompare(a,b,stat,matchLookup)),
    mw,ml,sw,sl,pw,pl,sr:i=>sl[i]===0?(sw[i]===0?0:9999):sw[i]/sl[i],ptRate:i=>pl[i]===0?(pw[i]===0?0:9999):pw[i]/pl[i],winRate:i=>mtot[i]===0?0:mw[i]/mtot[i]
  };
}

function renderDay2ThreeLeagues(sec){
  const d2=TOURNAMENT[sec].day2;
  let html=`<div class="card" style="border-left:5px solid var(--purple)"><div class="ch ch-final">🏆 2日目: ${esc(d2.label)} <span class="venue-lbl">📍 ${esc(d2.venue)}</span></div><div class="cb"><div class="league-grid">`;
  let totalDay2DoneLeagues = 0;

  d2.leagues.forEach(lg=>{
    const teams=getDay2LeagueTeams(sec,d2.partIds,lg.rank);
    const matchIds=[`${lg.id}_m0`,`${lg.id}_m1`,`${lg.id}_m2`];
    const rk=calcDay2LeagueRank(matchIds,teams);
    const labels=['①vs②','②vs③','③vs①'],pairs=[[0,1],[1,2],[2,0]];
    let mhtml='',doneM=0;
    matchIds.forEach((mid,idx)=>{
      const[i,j]=pairs[idx];
      const r = t2MatchResult(mid);
      if(r.entered) doneM++;
      mhtml+=`<tr>
        <td class="mn">${labels[idx]}</td>
        <td class="tc ${r.winA?'win-team':''}">${esc(teams[i])}</td>
        <td style="background:#fffef8; min-width:90px;">${makeScoreDisplayHTML(r)}</td>
        <td class="tc" style="text-align:right!important; padding-right:6px; ${r.winB?'win-team':''}">${esc(teams[j])}</td>
      </tr>`;
    });
    if(doneM === 3) totalDay2DoneLeagues++;

    let rhtml='';
    rk.ranked.forEach((ti,ri)=>{
      rhtml+=`<tr><td style="font-weight:900;background:#f8fafc">${ri+1}</td><td class="rn">${esc(teams[ti])}</td><td>${rk.mw[ti]}勝${rk.ml[ti]}敗</td><td>${rk.winRate(ti).toFixed(3)}</td><td>${rk.sw[ti]}/${rk.sl[ti]}<br><span style="color:#666">${rk.sl[ti]===0?'MAX':rk.sr(ti).toFixed(3)}</span></td><td>${rk.pw[ti]}/${rk.pl[ti]}<br><span style="color:#666">${rk.pl[ti]===0?'MAX':rk.ptRate(ti).toFixed(3)}</span></td></tr>`;
    });

    html+=`<div class="part-card" style="border-top:3px solid ${lg.color}"><div class="part-head" style="background:#34495e"><span>🔥 ${esc(lg.label)}</span></div><div class="part-body"><table class="mtbl"><thead><tr><th style="width:35px">順序</th><th style="width:105px">チーム①</th><th>結果・スコア</th><th style="width:105px">チーム②</th></tr></thead><tbody>${mhtml}</tbody></table>${doneM===3?`<div style="margin-top:12px;font-weight:900;font-size:11px;color:var(--green);margin-bottom:4px">📊 【確定】リーグ順位表</div><table class="rtbl"><thead><tr><th style="width:22px">位</th><th>チーム</th><th style="width:45px">勝敗</th><th style="width:38px">勝率</th><th style="width:45px">セット率</th><th style="width:45px">得点率</th></tr></thead><tbody>${rhtml}</tbody></table>`:`<div class="pending-msg">⏳ 進行中（全試合終了後に順位確定）</div>`}</div></div>`;
  });
  html+=`</div></div></div>`;

  if (totalDay2DoneLeagues === 3) {
    html+=`<div class="podium"><div class="podium-title">🏆 最終総合順位（全試合終了・確定）</div>`;
    const medalsTop=['🥇 優勝','🥈 準優勝','🥉 3位'],bgTop=['#fef9c3','#f1f5f9','#ffedd5'],txTop=['#854d0e','#475569','#c2410c'];
    d2.leagues.forEach(lg=>{
      const teams=getDay2LeagueTeams(sec,d2.partIds,lg.rank);
      const rk=calcDay2LeagueRank([`${lg.id}_m0`,`${lg.id}_m1`,`${lg.id}_m2`],teams);
      rk.ranked.forEach((ti,ri)=>{
        const overallIdx=lg.overallBase+ri;
        const isTop3=overallIdx<3;
        const label=isTop3?medalsTop[overallIdx]:`${esc(lg.label)}${ri+1}位`;
        const bg=isTop3?bgTop[overallIdx]:'#f3f4f6';
        const tx=isTop3?txTop[overallIdx]:'#374151';
        html+=`<div class="podium-row"><span class="podium-rank-lbl" style="color:#666">${label}</span><span class="podium-name" style="background:${bg};color:${tx}">${esc(teams[ti])}</span></div>`;
      });
    });
    html+=`</div>`;
  } else {
    html+=`<div class="pending-msg" style="background:#fff; border-color:var(--purple); color:var(--purple); padding:16px;">🏆 最終総合順位は、2日目の全試合が終了するとここに表示されます。</div>`;
  }
  return html;
}

  const d1el=document.getElementById(`day-female-1`);

    let html='<div class="league-grid">';

    d1el.innerHTML=html+'</div>';
  }

const AUTO_REFRESH_MS = 60000; // 自動更新の間隔（60秒）
let autoRefreshTimer = null;
let autoRefreshOn = true;

function startAutoRefresh(){
  if(autoRefreshTimer) clearInterval(autoRefreshTimer);
  autoRefreshTimer = setInterval(()=>cloudLoad(true), AUTO_REFRESH_MS);
}
function stopAutoRefresh(){
  if(autoRefreshTimer){ clearInterval(autoRefreshTimer); autoRefreshTimer=null; }
}
function updateAutoRefreshBtn(){
  const btn = document.getElementById('auto-refresh-btn');
  if(!btn) return;
  if(autoRefreshOn){
    btn.textContent = '⏱️ 自動更新: ON';
    btn.classList.remove('off');
  } else {
    btn.textContent = '⏱️ 自動更新: OFF';
    btn.classList.add('off');
  }
}
function toggleAutoRefresh(){
  autoRefreshOn = !autoRefreshOn;
  try{ localStorage.setItem('yamanashi_viewer_autorefresh', autoRefreshOn ? '1' : '0'); }catch(e){}
  if(autoRefreshOn){ startAutoRefresh(); showToast('自動更新をONにしました'); }
  else { stopAutoRefresh(); showToast('自動更新をOFFにしました（手動更新は引き続き使えます）'); }
  updateAutoRefreshBtn();
}

window.addEventListener('DOMContentLoaded',()=>{ 
  load(); 
  renderAll(); 
  cloudLoad(); // 起動時に最新のクラウドデータを自動取得

  // 前回の自動更新ON/OFF設定を復元（初めての場合はON）
  try{
    const saved = localStorage.getItem('yamanashi_viewer_autorefresh');
    if(saved === '0') autoRefreshOn = false;
  }catch(e){}
  updateAutoRefreshBtn();
  if(autoRefreshOn) startAutoRefresh();
});
</script>
